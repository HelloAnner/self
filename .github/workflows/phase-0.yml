name: Phase 0 baseline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  baseline:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Provide extension-capable SQLite on macOS
        if: runner.os == 'macOS'
        run: brew install sqlite
      - name: Install exact dependencies
        run: bun install --frozen-lockfile
      - name: Type, lint, size, and unit gates
        run: bun run check
      - name: SQLite, FTS5, and sqlite-vec spike
        run: bun run spike:sqlite
      - name: Build standalone CLI
        run: bun run build
      - name: Real CLI and npm launcher E2E
        run: bun run test:e2e
